services:
#--
  postgres:
    container_name: postgres-sql
    image: postgres:16
    environment:
      POSTGRES_USER: mapache
      POSTGRES_PASSWORD: adminPassword
      POSTGRES_DB: book_social
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - spring-demo
    restart: unless-stopped
#--
  mail-dev:
    container_name: mail-dev
    image: axllent/mailpit:v1.27
    ports:
      - "1080:1080"
      - "1025:1025"
    volumes:
      - mail_data:/data
#--
networks:
  spring-demo:
    driver: bridge
#--
volumes:
  postgres:
  mail_data: